services:
  - type: web
    name: supportbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: supportbot-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: supportbot-db
    plan: free
